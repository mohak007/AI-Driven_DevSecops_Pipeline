version: '3.8'
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
    - discovery.type=single-node
    - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
    - "9200:9200"
    volumes:
    - es_data:/usr/share/elasticsearch/data
    networks:
    - elk
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
    -  "5601:5601"
    depends_on:
    -  elasticsearch
    environment:
    - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
    - elk
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    ports:
    - "5044:5044"
    volumes:
    - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    - ./logs:/workspace/logs
    depends_on:
    - elasticsearch
    networks:
    - elk
  app:
    build:
      context: ./app
    container_name: ai-devsecops-app
    ports:
    - "5000:5000"
    volumes:
    - ./logs:/workspace/logs
    depends_on:
    - elasticsearch
    - logstash
    networks:
    - elk
volumes:
  es_data:
  
networks:
  elk:
    driver: bridge
