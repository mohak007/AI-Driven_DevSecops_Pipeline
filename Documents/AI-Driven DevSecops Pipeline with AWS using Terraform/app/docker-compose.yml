version: "3.9"
services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-devsecops-app:local
    container_name: flask-login-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
    #phase 2 logstash will be used to tail these via shared volume or beats agent
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl","-f","http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
